<form action="" method="get">
<label>
    <h1>Cotizar</h1>
</label>

<label>Nombre</label>
<br>
<br>
<input type="text" name="nombre" placeholder="Ingrese su nombre" required>
<br>
<br>
<label>Tipo de Documento</label>
<br>
<br>
<select name="tipo de documento" required>
    <option value="" selected disabled>Seleccionar</option>
    <option value="opcion1">DNI</option>
    <option value="opcion2">Carné de extranjería</option>
</select>
<br>
<br>
<label>Número de Documento</label>
<br>
<br>
<input type="number" name="documento" maxlength="9" placeholder="Ej: 123456789" required>
<br>
<br>
<label>Email</label>
<br>
<br>
<input type="email" name="correo" placeholder="Email" required>
<br>
<br>
<label">Celular</label>
<br>
<br>
<input type="number" name="celular" maxlength="9" placeholder="Celular" required>
<br>
<br>
<label>Tienda</label>
<br>
<br>
<select name="tienda" required>
    <option value="" selected disabled>Seleccionar</option>
    <option value="opcion1">San Isidro</option>
    <option value="opcion2">Chorrillos</option>
    <option value="opcion3">Miraflores</option>
</select>
<br>
<br>
<label>Modelo</label>
<br>
<br>
<select name="modelo" required>
    <option value="" selected disabled>Seleccionar</option>
    <option value="opcion1">HYUNDAI</option>
    <option value="opcion2">KIA</option>
    <option value="opcion3">TOYOTA</option>
</select>
<br>
<br>
<label>¿Desea financiamiento?</label>
<br>
<br>
<select name="modelo" required>
    <option value="" selected disabled>Seleccionar</option>
    <option value="opcion1">Sí</option>
    <option value="opcion2">No</option>
</select>
<br>
<br>
<input type="submit">
</form>
