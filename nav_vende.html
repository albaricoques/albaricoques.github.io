<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vende tu Auto</title>
</head>
<body>
    <header>
        <nav>
            <a href="index.html"><img src="imagenes/CAR.png" alt="logo" height="150" width="200"></a>
            <a href="nav_seminuevos.html">SEMINUEVOS</a>
            <a href="nav_vende.html">VENDE TU AUTO</a>
            <a href="nav_locales.html">LOCALES</a>
            <a href="nav_postventa.html">POST VENTA</a>
        </nav>
        <br>
        <br>
    </header>

    <main>
        <form action="" method="get">
        <label>
            <h1>Vende tu auto</h1>
        </label>

        <label>Nombre</label>
        <br>
        <br>
        <input type="text" name="nombre" placeholder="Ingrese su nombre" required>
        <br>
        <br>
        <label>Tipo de Documento</label>
        <br>
        <br>
        <select name="tipo de documento" required>
    <option value="" selected disabled>Seleccionar</option>
    <option value="opcion1">DNI</option>
    <option value="opcion2">Carné de extranjería</option>
        </select>
        <br>
        <br>
        <label>Número de Documento</label>
        <br>
        <br>
        <input type="number" name="documento" maxlength="9" placeholder="Ej: 123456789" required>
        <br>
        <br>
        <label>Email</label>
        <br>
        <br>
        <input type="email" name="correo" placeholder="Email" required>
        <br>
        <br>
        <label">Celular</label>
        <br>
        <br>
        <input type="number" name="celular" maxlength="9" placeholder="Celular" required>
        <br>
        <br>
        <label>Marca</label>
        <br>
        <br>
        <input type="text" placeholder="Marca" required>
        <br>
        <br>
        <label>Modelo</label>
        <br>
        <br>
        <input type="text" placeholder="Modelo" required>
        <br>
        <br>
        <label>Año</label>
        <br>
        <br>
        <input type="number" maxlength="4" placeholder="Año" required>
        <br>
        <br>
        <label>Kilometraje</label>
        <br>
        <br>
        <input type="number" placeholder="000.000" required>
        <br>
        <br>
        <label>Placa</label>
        <br>
        <br>
        <input type="text" placeholder="AAA-123" required>
        <br>
        <br>
        <textarea placeholder="Mensaje (opcional)"></textarea>
        <br>
        <br>
        <input type="checkbox" name="terminos" required>
        <label for="terminos">He leído y acepto los <u>término y condiciones</u><br>de las políticas de privacidad vigentes</label>
        <br>
        <br>
        <input type="submit">
        </form>
    </main>

    <footer>
        <picture>
            <img src="imagenes/CAR.png" alt="logo" height="100" width="100">
        </picture>
        
        <h2>CarVende</h2>

        <h2>Contáctanos</h2>
        <ul>

            <li><a href="footer_consultas.html">Consultas</a></li>
            <li><a href="nav_locales.html">Locales</a></li>
        </ul>

        <picture>
            <img src="imagenes/facebook.png" alt="facebook" height="25" width="25">
        </picture>
        <picture>
            <img src="imagenes/instagram.png" alt="instagram" height="25" width="25">
        </picture>
        <picture>
            <img src="imagenes/tiktok.png" alt="tiktok" height="25" width="25">
        </picture>
        <picture>
            <img src="imagenes/youtube.png" alt="youtube" height="25" width="25">
        </picture>
        <picture>
            <img src="imagenes/linkdn.png" alt="linkdn" height="25" width="25">
        </picture>
        <br>
        <picture>
            <img src="imagenes/reclamaciones.b5bcda5.png" alt="libro de reclamaciones" height="150" width="250">
