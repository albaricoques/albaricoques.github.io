    <main>
        <form action="" method="get">
            <label><h1>Agendar Servicio Técnico</h1></label>
            <br>
            <br>
            <label>Tipo de vehículo</label>
            <br>
            <br>
            <input type="radio" name="auto" required>
            <label for="auto">Auto</label>
            <input type="radio" name="camion" required> 
            <label for="camion">Camión</label>
            <br>
            <br>
            <label>Placa</label>
            <br>
            <br>
            <input type="text" placeholder="AAA-123" required>
            <br>
            <br>
            <label>Año</label>
            <br>
            <br>
            <input type="number" maxlength="4" placeholder="Año" required>
            <br>
            <br>
            <label>Modelo</label>
            <br>
            <br>
            <input type="text" placeholder="Modelo" required>
            <br>
            <br>
            <label>Versión</label>
            <br>
            <br>
            <input type="text" placeholder="Versión" required>
            <br>
            <br>
            <label>Servicio a realizar</label>
            <br>
            <br>
            <select name="servicio" required>
                <option value="" disabled selected>Seleccionar</option>
                <option value="1">Primera inspección</option>
                <option value="2">Correctivo</option>
                <option value="3">Pintura</option>
            </select>
            <br>
            <br>
            <label>Local</label>
            <br>
            <br>
            <select name="Local" required>
                <option value="" selected disabled>Seleccionar</option>
                <option value="opcion1">San Isidro</option>
                <option value="opcion2">Chorrillos</option>
                <option value="opcion3">Miraflores</option>
            </select>
            <br>
            <br>
            <label>Fecha y Hora</label>
            <br>
            <br>
            <input type="date" required>
            <input type="time" required>
            <br>
            <br>
            <input type="submit">
        </form>
    </main>
